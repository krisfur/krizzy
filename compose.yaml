services:
  krizzy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krizzy
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDRESS: ":8080"
      DATABASE_PATH: "/data/krizzy.db"
    volumes:
      - krizzy-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  krizzy-data:
